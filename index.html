<!DOCTYPE html>
<html>
<head>
    <title>Slither Challenge 🐍</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #111;
            color: white;
            margin: 0;
            padding: 0;
        }
        .game-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            margin-top: 20px;
            flex-direction: column; /* default: phone layout */
        }
        canvas {
            background: black;
            border: 2px solid #0f0;
            display: block;
            margin: 0 auto;
        }
        #controls {
            margin-top: 15px;
            text-align: center;
        }
        .btn {
            width: 20vw; height: 20vw;
            max-width: 100px; max-height: 100px;
            margin: 8px; font-size: 6vw;
            font-weight: bold; border-radius: 25px;
            border: none; background: #0f0; color: black;
            cursor: pointer; user-select: none;
        }
        .btn:active { background: #0c0; }
        #restart {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 100px;
            height: 40px;
            font-size: 16px;
            border-radius: 8px;
            background: #0f0;
            color: black;
            font-weight: bold;
        }
        /* On larger screens (PC/laptop), place controls to the right */
        @media (min-width: 768px) {
            .game-container {
                flex-direction: row;
            }
            #controls {
                margin-left: 20px;
                margin-top: 0;
                text-align: left;
            }
        }
    </style>
</head>
<body>

<h2>Slither Challenge 🐍</h2>
<h3>Score: <span id="score">0</span></h3>

<div class="game-container">
    <canvas id="game"></canvas>
    <div id="controls">
        <div><button class="btn" id="up">⬆️</button></div>
        <div>
            <button class="btn" id="left">⬅️</button>
            <button class="btn" id="down">⬇️</button>
            <button class="btn" id="right">➡️</button>
        </div>
    </div>
</div>

<button id="restart">Restart</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// Landscape rectangle for phone and PC
if(window.innerWidth < 768){
    canvas.width  = Math.min(window.innerWidth * 0.9, 480);
    canvas.height = Math.min(window.innerHeight * 0.5, 300);
} else {
    canvas.width  = Math.min(window.innerWidth * 0.7, 800);
    canvas.height = Math.min(window.innerHeight * 0.6, 500);
}

// Grid setup
let cols = 20;
let rows = 15;
let boxX = canvas.width / cols;
let boxY = canvas.height / rows;

let snake, direction, score, speed, game;
let foods = [];
let hazards = [];
let bonusFood = null;
let bonusTimer = 0;
let highScore = localStorage.getItem("highScore") || 0;

function init() {
    snake = [{col: 10, row: 7}];
    direction = "RIGHT";
    score = 0;
    speed = 200;
    foods = [];
    hazards = [];
    bonusFood = null;
    spawnFood();
    document.getElementById("score").innerText = score;
    if (game) clearInterval(game);
    game = setInterval(draw, speed);
}

function randomPos() {
    let col = Math.floor(Math.random()*cols);
    let row = Math.floor(Math.random()*rows);
    return {col, row};
}

function spawnFood() { foods.push(randomPos()); }
function spawnHazard() { hazards.push(randomPos()); }
function spawnBonus(value) { bonusFood = {...randomPos(), value}; bonusTimer = 200; }

// Controls
document.onkeydown = e => {
    if (e.key === "ArrowLeft" && direction !== "RIGHT") direction = "LEFT";
    else if (e.key === "ArrowUp" && direction !== "DOWN") direction = "UP";
    else if (e.key === "ArrowRight" && direction !== "LEFT") direction = "RIGHT";
    else if (e.key === "ArrowDown" && direction !== "UP") direction = "DOWN";
};
document.getElementById("up").onclick = () => { if(direction!=="DOWN") direction="UP"; };
document.getElementById("down").onclick = () => { if(direction!=="UP") direction="DOWN"; };
document.getElementById("left").onclick = () => { if(direction!=="RIGHT") direction="LEFT"; };
document.getElementById("right").onclick = () => { if(direction!=="LEFT") direction="RIGHT"; };
document.getElementById("restart").onclick = init;

function drawSnake() {
    snake.forEach((part, index) => {
        ctx.fillStyle = index===0 ? "yellow" : "lime";
        ctx.fillRect(part.col*boxX, part.row*boxY, boxX, boxY);
    });
}

function drawFoods() {
    foods.forEach(food => {
        ctx.fillStyle = "red";
        ctx.beginPath();
        ctx.arc(food.col*boxX + boxX/2, food.row*boxY + boxY/2, Math.min(boxX,boxY)/2, 0, Math.PI*2);
        ctx.fill();
    });
}

function drawHazards() {
    hazards.forEach(h => {
        ctx.fillStyle = "#333";
        ctx.fillRect(h.col*boxX, h.row*boxY, boxX, boxY);
    });
}

function drawBonus() {
    if(bonusFood){
        ctx.fillStyle = "gold";
        ctx.font = Math.min(boxX,boxY) + "px Arial";
        ctx.fillText("★", bonusFood.col*boxX+5, bonusFood.row*boxY+boxY-5);

        ctx.fillStyle = "white";
        ctx.fillRect(bonusFood.col*boxX, bonusFood.row*boxY-8, boxX, 5);
        ctx.fillStyle = "blue";
        ctx.fillRect(bonusFood.col*boxX, bonusFood.row*boxY-8, (bonusTimer/200)*boxX, 5);

        bonusTimer--;
        if(bonusTimer <= 0) bonusFood = null;
    }
}

function drawStageMessages() {
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    if(score >= 20 && score < 50) ctx.fillText("Stage 2: Harder!", canvas.width/3, 20);
    if(score >= 50 && score < 100) ctx.fillText("Stage 3: Hard!", canvas.width/3, 20);
    if(score >= 100 && score < 150) ctx.fillText("Stage 4: Harder!", canvas.width/3, 20);
    if(score >= 150) ctx.fillText("Stage 5: Hardest!", canvas.width/3, 20);
}

function draw() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    drawSnake();
    drawFoods();
    drawHazards();
    drawBonus();
    drawStageMessages();

    let head = {col: snake[0].col, row: snake[0].row};
    if (direction === "LEFT") head.col--;
    if (direction === "UP") head.row--;
    if (direction === "RIGHT") head.col++;
    if (direction === "DOWN") head.row++;

    if(head.col >= cols) head.col = 0;
    if(head.col < 0) head.col = cols-1;
    if(head.row >= rows) head.row = 0;
    if(head.row < 0) head.row = rows-1;

    let ate = false;
    foods.forEach((food, i) => {
        if(head.col === food.col && head.row === food.row){
            score++;
            document.getElementById("score").innerText = score;
            foods.splice(i,1);
            ate = true;
            spawnFood();

            if(score % 5 === 0) spawnBonus(3);
            if(score % 10 === 0) spawnBonus(5);
            if(score % 20 === 0){
                spawnHazard();
                speed = Math.max(50, speed - 20);
                clearInterval(game);
                game = setInterval(draw, speed);
            }
        }
    });

    if(bonusFood && head.col === bonusFood.col && head.row === bonusFood.row){
        score += bonusFood.value;
        document.getElementById("score").innerText = score;
        bonusFood = null;
    }

    if(!ate) snake.pop();

    // Game over if snake hits itself
    if(snake.some(part => part.col === head.col && part.row === head.row)){
        clearInterval(game);
        if(score > highScore){ localStorage.setItem("highScore", score); highScore = score; }
        ctx.fillStyle = "white";
        ctx.font = Math.min(boxX,boxY) + "px Arial";
        ctx.fillText("GAME OVER!", canvas.width/4, canvas.height/2);
        ctx.fillText("Score: " + score, canvas.width/4, canvas.height/2 + boxY*1.5);
        ctx.fillText("High Score: " + highScore, canvas.width/4, canvas.height/2 + boxY*3);
        return;
    }

    snake.unshift(head);
}

init();
</script>
</body>
</html>
