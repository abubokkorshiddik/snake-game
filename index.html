<!DOCTYPE html>
<html>
<head>
    <title>Slither Challenge 🐍</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        html, body {
            touch-action: manipulation;
        }
        body {
            text-align: center;
            font-family: Arial;
            background: #111;
            color: white;
            margin: 0;
            padding: 0;
        }
        canvas {
            background: black;
            border: 2px solid #0f0;
        }
        #controls {
            margin-top: 15px;
        }
        .btn {
            width: 25vw;
            height: 25vw;
            max-width: 150px;
            max-height: 150px;
            margin: 8px;
            font-size: 8vw;
            font-weight: bold;
            border-radius: 25px;
            border: none;
            background: #0f0;
            color: black;
            cursor: pointer;
            user-select: none;
        }
        .btn:active {
            background: #0c0;
        }
        #restart {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 30vw;
            max-width: 160px;
            height: 10vw;
            max-height: 60px;
            font-size: 4vw;
            border-radius: 12px;
        }
    </style>
</head>
<body>

<h2>Slither Challenge 🐍</h2>
<h3>Score: <span id="score">0</span></h3>
<canvas id="game"></canvas>

<div id="controls">
    <div>
        <button class="btn" id="up">⬆️</button>
    </div>
    <div>
        <button class="btn" id="left">⬅️</button>
        <button class="btn" id="down">⬇️</button>
        <button class="btn" id="right">➡️</button>
    </div>
</div>

<button class="btn" id="restart">Restart</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// Decide square for phone, rectangle for PC
if(window.innerWidth < 768){ 
    // phone: square
    canvas.width = Math.min(window.innerWidth * 0.95, 500);
    canvas.height = canvas.width;
} else {
    // pc: rectangle
    canvas.width = Math.min(window.innerWidth * 0.95, 800);
    canvas.height = Math.min(window.innerHeight * 0.7, 600);
}

let cols = 20;
let rows = (canvas.height < canvas.width) ? 20 : 15; // more rows if rectangle
let boxX = canvas.width / cols;
let boxY = canvas.height / rows;

let snake, direction, score, speed, game;
let foods = [];
let hazards = [];
let bonusFood = null;
let bonusTimer = 0;
let frameCount = 0;
let highScore = localStorage.getItem("highScore") || 0;

function init() {
    snake = [{x: 10*boxX, y: 7*boxY}];
    direction = "RIGHT";
    score = 0;
    speed = 200;
    foods = [];
    hazards = [];
    bonusFood = null;
    spawnFood();
    document.getElementById("score").innerText = score;

    if (game) clearInterval(game);
    game = setInterval(draw, speed);
}

function randomPos() {
    let x = Math.floor(Math.random()*cols) * boxX;
    let y = Math.floor(Math.random()*rows) * boxY;
    return {x,y};
}

function spawnFood() { foods.push(randomPos()); }
function spawnHazard() { hazards.push(randomPos()); }
function spawnBonus(value) { bonusFood = {...randomPos(), value}; bonusTimer = 200; }

// Controls
document.onkeydown = e => {
    if (e.key === "ArrowLeft" && direction !== "RIGHT") direction = "LEFT";
    else if (e.key === "ArrowUp" && direction !== "DOWN") direction = "UP";
    else if (e.key === "ArrowRight" && direction !== "LEFT") direction = "RIGHT";
    else if (e.key === "ArrowDown" && direction !== "UP") direction = "DOWN";
};
document.getElementById("up").onclick = () => { if(direction!=="DOWN") direction="UP"; };
document.getElementById("down").onclick = () => { if(direction!=="UP") direction="DOWN"; };
document.getElementById("left").onclick = () => { if(direction!=="RIGHT") direction="LEFT"; };
document.getElementById("right").onclick = () => { if(direction!=="LEFT") direction="RIGHT"; };
document.getElementById("restart").onclick = init;

function drawSnake() {
    snake.forEach((part, index) => {
        ctx.fillStyle = index===0 ? "yellow" : "lime";
        ctx.fillRect(part.x, part.y, boxX, boxY);
    });
}

function drawFoods() {
    frameCount++;
    foods.forEach(food => {
        ctx.fillStyle = frameCount % 20 < 10 ? "red" : "#ff5555";
        ctx.beginPath();
        ctx.arc(food.x + boxX/2, food.y + boxY/2, Math.min(boxX,boxY)/2, 0, Math.PI*2);
        ctx.fill();
    });
}

function drawHazards() {
    hazards.forEach(h => {
        ctx.fillStyle = "#333";
        ctx.fillRect(h.x, h.y, boxX, boxY);
    });
}

function drawBonus() {
    if(bonusFood){
        ctx.fillStyle = "gold";
        ctx.font = Math.min(boxX,boxY) + "px Arial";
        ctx.fillText("★", bonusFood.x+5, bonusFood.y+boxY-5);
        bonusTimer--;
        if(bonusTimer <= 0) bonusFood = null;
    }
}

function draw() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    drawSnake();
    drawFoods();
    drawHazards();
    drawBonus();

    let headX = snake[0].x;
    let headY = snake[0].y;
    if (direction === "LEFT") headX -= boxX;
    if (direction === "UP") headY -= boxY;
    if (direction === "RIGHT") headX += boxX;
    if (direction === "DOWN") headY += boxY;

    if(headX >= canvas.width) headX = 0;
    if(headX < 0) headX = canvas.width - boxX;
    if(headY >= canvas.height) headY = 0;
    if(headY < 0) headY = canvas.height - boxY;

    let ate = false;
    foods.forEach((food, i) => {
        if(headX === food.x && headY === food.y){
            score++;
            document.getElementById("score").innerText = score;
            foods.splice(i,1);
            ate = true;
            spawnFood();
        }
    });

    if(bonusFood && headX === bonusFood.x && headY === bonusFood.y){
        score += bonusFood.value;
        document.getElementById("score").innerText = score;
        bonusFood = null;
    }

    if(!ate) snake.pop();

    let newHead = {x: headX, y: headY};

    if(snake.some(part => part.x === headX && part.y === headY)){
        clearInterval(game);
        if(score > highScore){ localStorage.setItem("highScore", score); highScore = score; }
        ctx.fillStyle = "white";
        ctx.font = Math.min(boxX,boxY) + "px Arial";
        ctx.fillText("GAME OVER!", canvas.width/4, canvas.height/2);
        ctx.fillText("Score: " + score, canvas.width/4, canvas.height/2 + boxY*1.5);
        ctx.fillText("High Score: " + highScore, canvas.width/4, canvas.height/2 + boxY*3);
    }

    snake.unshift(newHead);
}

init();
</script>
</body>
</html>
