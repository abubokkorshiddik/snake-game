<!DOCTYPE html>
<html>
<head>
    <title>Slither Challenge 🐍</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #111;
            color: white;
            margin: 0;
            padding: 0;
        }
        canvas {
            background: black;
            margin-top: 10px;
            border: 2px solid #0f0;
        }
        #controls {
            margin-top: 15px;
        }
        .btn {
            width: 120px;   /* Larger buttons */
            height: 120px;
            margin: 10px;
            font-size: 48px; /* Bigger arrows */
            font-weight: bold;
            border-radius: 20px;
            border: none;
            background: #0f0;
            color: black;
            cursor: pointer;
            user-select: none;
        }
        .btn:active {
            background: #0c0;
        }
        #restart {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 140px;
            height: 50px;
            font-size: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<h2>Slither Challenge 🐍</h2>
<h3>Score: <span id="score">0</span></h3>
<canvas id="game" width="600" height="600"></canvas>

<div id="controls">
    <div>
        <button class="btn" id="up">⬆️</button>
    </div>
    <div>
        <button class="btn" id="left">⬅️</button>
        <button class="btn" id="down">⬇️</button>
        <button class="btn" id="right">➡️</button>
    </div>
</div>

<button class="btn" id="restart">Restart</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let box = 30; // Snake size
let snake, direction, food, score, speed, game;

// Load high score
let highScore = localStorage.getItem("highScore") || 0;

function init() {
    snake = [{x: 10*box, y: 10*box}];
    direction = "RIGHT";
    score = 0;
    speed = 200; // starting speed
    food = randomFood();
    document.getElementById("score").innerText = score;

    if (game) clearInterval(game);
    game = setInterval(draw, speed);
}

function randomFood() {
    let x = Math.floor(Math.random()*Math.floor(600/box)) * box;
    let y = Math.floor(Math.random()*Math.floor(600/box)) * box;
    while(snake.some(part => part.x === x && part.y === y)) {
        x = Math.floor(Math.random()*Math.floor(600/box)) * box;
        y = Math.floor(Math.random()*Math.floor(600/box)) * box;
    }
    return {x, y};
}

// Keyboard controls
document.addEventListener("keydown", e => {
    if (e.key === "ArrowLeft" && direction !== "RIGHT") direction = "LEFT";
    else if (e.key === "ArrowUp" && direction !== "DOWN") direction = "UP";
    else if (e.key === "ArrowRight" && direction !== "LEFT") direction = "RIGHT";
    else if (e.key === "ArrowDown" && direction !== "UP") direction = "DOWN";
});

// Touch button controls (instant response)
document.getElementById("up").onclick = () => { if(direction!=="DOWN") direction="UP"; };
document.getElementById("down").onclick = () => { if(direction!=="UP") direction="DOWN"; };
document.getElementById("left").onclick = () => { if(direction!=="RIGHT") direction="LEFT"; };
document.getElementById("right").onclick = () => { if(direction!=="LEFT") direction="RIGHT"; };

// Restart button
document.getElementById("restart").onclick = init;

function draw() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, 600, 600);

    // Draw snake with gradient body
    snake.forEach((part, index) => {
        let gradient = ctx.createLinearGradient(part.x, part.y, part.x+box, part.y+box);
        gradient.addColorStop(0, "lime");
        gradient.addColorStop(1, "green");
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.roundRect(part.x, part.y, box, box, 8);
        ctx.fill();

        // Head with distinct color
        if(index === 0){
            ctx.fillStyle = "yellow";
            ctx.beginPath();
            ctx.roundRect(part.x, part.y, box, box, 10);
            ctx.fill();
        }
    });

    // Draw food
    ctx.fillStyle = "red";
    ctx.beginPath();
    ctx.arc(food.x + box/2, food.y + box/2, box/2, 0, Math.PI*2);
    ctx.fill();

    let headX = snake[0].x;
    let headY = snake[0].y;

    if (direction === "LEFT") headX -= box;
    if (direction === "UP") headY -= box;
    if (direction === "RIGHT") headX += box;
    if (direction === "DOWN") headY += box;

    // Wrap-around screen
    if(headX >= 600) headX = 0;
    if(headX < 0) headX = 600 - box;
    if(headY >= 600) headY = 0;
    if(headY < 0) headY = 600 - box;

    // Eat food
    if(headX === food.x && headY === food.y){
        score++;
        document.getElementById("score").innerText = score;
        food = randomFood();

        // Increase speed every 20 points
        if(score % 20 === 0){
            speed = Math.max(50, speed - 20); // faster, but not too fast
            clearInterval(game);
            game = setInterval(draw, speed); // restart loop immediately
        }
    } else {
        snake.pop();
    }

    let newHead = {x: headX, y: headY};

    // Game over only if hits itself
    if(snake.some(part => part.x === headX && part.y === headY)){
        clearInterval(game);
        if(score > highScore){ localStorage.setItem("highScore", score); highScore = score; }
        alert("Game Over!\nScore: " + score + "\nHigh Score: " + highScore);
    }

    snake.unshift(newHead);
}

// Start game
init();
</script>
</body>
</html>
