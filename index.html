<!DOCTYPE html>
<html>
<head>
    <title>Advanced Snake Game</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #111;
            color: white;
        }
        canvas {
            background: black;
            margin-top: 10px;
            border: 2px solid #0f0;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h2>🐍 Advanced Snake Game</h2>
<h3>Score: <span id="score">0</span></h3>

<canvas id="game" width="400" height="400"></canvas><br>
<button onclick="restartGame()">Restart</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let box = 20;
let snake, direction, food, score, speed, game;

// Load high score
let highScore = localStorage.getItem("highScore") || 0;

function init() {
    snake = [{x: 200, y: 200}];
    direction = "RIGHT";
    score = 0;
    speed = 120;

    food = randomFood();

    document.getElementById("score").innerText = score;

    if (game) clearInterval(game);
    game = setInterval(draw, speed);
}

function randomFood() {
    return {
        x: Math.floor(Math.random()*20)*box,
        y: Math.floor(Math.random()*20)*box
    };
}

document.addEventListener("keydown", changeDirection);

function changeDirection(event) {
    if (event.key === "ArrowLeft" && direction !== "RIGHT") direction = "LEFT";
    else if (event.key === "ArrowUp" && direction !== "DOWN") direction = "UP";
    else if (event.key === "ArrowRight" && direction !== "LEFT") direction = "RIGHT";
    else if (event.key === "ArrowDown" && direction !== "UP") direction = "DOWN";
}

function draw() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, 400, 400);

    // Snake
    ctx.fillStyle = "lime";
    snake.forEach(part => {
        ctx.fillRect(part.x, part.y, box, box);
    });

    // Food
    ctx.fillStyle = "red";
    ctx.fillRect(food.x, food.y, box, box);

    let headX = snake[0].x;
    let headY = snake[0].y;

    if (direction === "LEFT") headX -= box;
    if (direction === "UP") headY -= box;
    if (direction === "RIGHT") headX += box;
    if (direction === "DOWN") headY += box;

    // Eat food
    if (headX === food.x && headY === food.y) {
        score++;
        document.getElementById("score").innerText = score;

        // Increase speed
        if (speed > 60) {
            speed -= 5;
            clearInterval(game);
            game = setInterval(draw, speed);
        }

        food = randomFood();
    } else {
        snake.pop();
    }

    let newHead = {x: headX, y: headY};

    // Game over conditions
    if (
        headX < 0 || headY < 0 || headX >= 400 || headY >= 400 ||
        snake.some(part => part.x === headX && part.y === headY)
    ) {
        clearInterval(game);

        // Save high score
        if (score > highScore) {
            localStorage.setItem("highScore", score);
            highScore = score;
        }

        alert("Game Over!\nScore: " + score + "\nHigh Score: " + highScore);
    }

    snake.unshift(newHead);
}

function restartGame() {
    init();
}

// Start game
init();
</script>

</body>
</html>
