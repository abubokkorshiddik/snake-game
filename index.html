<!DOCTYPE html>
<html>
<head>
    <title>Slither Challenge 🐍</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #111;
            color: white;
            margin: 0;
            padding: 0;
        }
        canvas {
            background: black;
            margin-top: 10px;
            border: 2px solid #0f0;
        }
        #controls {
            margin-top: 15px;
        }
        .btn {
            width: 150px;   /* Bigger buttons */
            height: 150px;
            margin: 12px;
            font-size: 60px; /* Larger arrows */
            font-weight: bold;
            border-radius: 25px;
            border: none;
            background: #0f0;
            color: black;
            cursor: pointer;
            user-select: none;
        }
        .btn:active {
            background: #0c0;
        }
        #restart {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 160px;
            height: 60px;
            font-size: 22px;
            border-radius: 12px;
        }
    </style>
</head>
<body>

<h2>Slither Challenge 🐍</h2>
<h3>Score: <span id="score">0</span></h3>
<canvas id="game" width="600" height="600"></canvas>

<div id="controls">
    <div>
        <button class="btn" id="up">⬆️</button>
    </div>
    <div>
        <button class="btn" id="left">⬅️</button>
        <button class="btn" id="down">⬇️</button>
        <button class="btn" id="right">➡️</button>
    </div>
</div>

<button class="btn" id="restart">Restart</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let box = 30;
let snake, direction, score, speed, game;
let foods = [];
let hazards = [];
let bonusFood = null;
let bonusTimer = 0;
let frameCount = 0;
let highScore = localStorage.getItem("highScore") || 0;

function init() {
    snake = [{x: 10*box, y: 10*box}];
    direction = "RIGHT";
    score = 0;
    speed = 200;
    foods = [];
    hazards = [];
    bonusFood = null;
    spawnFood();
    document.getElementById("score").innerText = score;

    if (game) clearInterval(game);
    game = setInterval(draw, speed);
}

function randomPos() {
    let x = Math.floor(Math.random()*Math.floor(600/box)) * box;
    let y = Math.floor(Math.random()*Math.floor(600/box)) * box;
    return {x,y};
}

function spawnFood() {
    let pos = randomPos();
    foods.push({x: pos.x, y: pos.y});
}

function spawnHazard() {
    let pos = randomPos();
    hazards.push({x: pos.x, y: pos.y});
}

function spawnBonus(value) {
    let pos = randomPos();
    bonusFood = {x: pos.x, y: pos.y, value};
    bonusTimer = 200; // ~10 seconds at 50ms frames
}

// Controls (super responsive)
document.onkeydown = e => {
    if (e.key === "ArrowLeft" && direction !== "RIGHT") direction = "LEFT";
    else if (e.key === "ArrowUp" && direction !== "DOWN") direction = "UP";
    else if (e.key === "ArrowRight" && direction !== "LEFT") direction = "RIGHT";
    else if (e.key === "ArrowDown" && direction !== "UP") direction = "DOWN";
};
document.getElementById("up").onclick = () => { if(direction!=="DOWN") direction="UP"; };
document.getElementById("down").onclick = () => { if(direction!=="UP") direction="DOWN"; };
document.getElementById("left").onclick = () => { if(direction!=="RIGHT") direction="LEFT"; };
document.getElementById("right").onclick = () => { if(direction!=="LEFT") direction="RIGHT"; };
document.getElementById("restart").onclick = init;

function drawSnake() {
    snake.forEach((part, index) => {
        let gradient = ctx.createLinearGradient(part.x, part.y, part.x+box, part.y+box);
        gradient.addColorStop(0, "lime");
        gradient.addColorStop(1, "green");
        ctx.fillStyle = gradient;
        ctx.fillRect(part.x, part.y, box, box);
        if(index === 0){
            ctx.fillStyle = "yellow";
            ctx.fillRect(part.x, part.y, box, box);
        }
    });
}

function drawFoods() {
    frameCount++;
    foods.forEach(food => {
        let pulse = 2 * Math.sin(frameCount / 10);
        ctx.fillStyle = frameCount % 20 < 10 ? "red" : "#ff5555";
        ctx.beginPath();
        ctx.arc(food.x + box/2, food.y + box/2, (box/2) + pulse, 0, Math.PI*2);
        ctx.fill();
    });
}

function drawHazards() {
    hazards.forEach(h => {
        ctx.fillStyle = "#333";
        ctx.fillRect(h.x, h.y, box+10, box+10); // bigger than food
    });
}

function drawBonus() {
    if(bonusFood){
        ctx.fillStyle = "gold";
        ctx.font = "24px Arial";
        ctx.fillText("★", bonusFood.x+5, bonusFood.y+25);

        // Timer bar
        ctx.fillStyle = "white";
        ctx.fillRect(bonusFood.x, bonusFood.y-8, box, 5);
        ctx.fillStyle = "blue";
        ctx.fillRect(bonusFood.x, bonusFood.y-8, (bonusTimer/200)*box, 5);

        bonusTimer--;
        if(bonusTimer <= 0){
            bonusFood = null;
        }
    }
}

function draw() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, 600, 600);

    drawSnake();
    drawFoods();
    drawHazards();
    drawBonus();

    let headX = snake[0].x;
    let headY = snake[0].y;
    if (direction === "LEFT") headX -= box;
    if (direction === "UP") headY -= box;
    if (direction === "RIGHT") headX += box;
    if (direction === "DOWN") headY += box;

    if(headX >= 600) headX = 0;
    if(headX < 0) headX = 600 - box;
    if(headY >= 600) headY = 0;
    if(headY < 0) headY = 600 - box;

    let ate = false;
    foods.forEach((food, i) => {
        if(headX === food.x && headY === food.y){
            score++;
            document.getElementById("score").innerText = score;
            foods.splice(i,1);
            ate = true;
            spawnFood();

            if(score % 5 === 0) spawnBonus(3);
            if(score % 10 === 0) spawnBonus(5);
            if(score % 20 === 0){
                spawnHazard();
                speed = Math.max(50, speed - 20);
                clearInterval(game);
                game = setInterval(draw, speed);
            }
        }
    });

    if(bonusFood && headX === bonusFood.x && headY === bonusFood.y){
        score += bonusFood.value;
        document.getElementById("score").innerText = score;
        bonusFood = null;
    }

    if(!ate) snake.pop();

    let newHead = {x: headX, y: headY};

    // Game over only if snake hits itself
    if(snake.some(part => part.x === headX && part.y === headY)){
        clearInterval(game);
        if(score > highScore){ localStorage.setItem("highScore", score); highScore = score; }
        ctx.fillStyle = "white";
        ctx.font = "40px Arial";
        ctx.fillText("GAME OVER!", 200, 300);
        ctx.fillText("Score: " + score, 200, 350);
        ctx.fillText("High Score: " + highScore, 200, 400);
    }

    snake.unshift(newHead);

    if(score >= 50 && score < 100) ctx.strokeText("Stage 2: Harder!", 250, 20);
    if(score >= 100 && score < 120) ctx.strokeText("Stage 3: Hard!", 250, 20);
    if(score >= 120 && score < 150) ctx.strokeText("Stage 4: Harder!", 250, 20);
    if(score >= 150) ctx.strokeText("Stage 5: Hardest!", 250, 20);
}

init();
</script>
</body>
</html>
